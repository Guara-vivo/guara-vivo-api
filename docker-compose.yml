services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PYTHONPATH: /app/src
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ACCESS_TOKEN_EXPIRE: ${JWT_ACCESS_TOKEN_EXPIRE}
      JWT_REFRESH_TOKEN_EXPIRE: ${JWT_REFRESH_TOKEN_EXPIRE:-2592000}
      RECORDS_CACHE_TTL_SECONDS: ${RECORDS_CACHE_TTL_SECONDS:-30}
      CORS_ORIGINS: ${CORS_ORIGINS}
      MAX_REQUEST_BODY_BYTES: ${MAX_REQUEST_BODY_BYTES}
      MAX_UPLOAD_FILE_BYTES: ${MAX_UPLOAD_FILE_BYTES:-5242880}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      SUPABASE_STORAGE_BUCKET: ${SUPABASE_STORAGE_BUCKET:-frontend-uploads}
      DATABASE_POOL_SIZE: ${DATABASE_POOL_SIZE}
      DATABASE_MAX_OVERFLOW: ${DATABASE_MAX_OVERFLOW}
      DATABASE_POOL_TIMEOUT: ${DATABASE_POOL_TIMEOUT}
      DATABASE_POOL_RECYCLE: ${DATABASE_POOL_RECYCLE}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      QUEUE_NAME: ${QUEUE_NAME}
    depends_on:
      rabbitmq:
        condition: service_healthy
    command: sh -c "alembic upgrade head && uvicorn src.main:app --host 0.0.0.0 --port 8001"
    networks:
      - guara-vivo-network

  identifier:
    build:
      context: ../guara-vivo-identifier
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - guara-vivo-network

  worker:
    build:
      context: ../guara-vivo-worker
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      QUEUE_NAME: ${QUEUE_NAME}
      ERROR_QUEUE_NAME: ${ERROR_QUEUE_NAME}
      IA_API_URL: ${IA_API_URL}
      DEBUG_SAVE_IMAGES_DIR: ${DEBUG_SAVE_IMAGES_DIR:-/debug/worker-images}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      MAX_RETRIES: ${MAX_RETRIES:-3}
      RABBITMQ_RECONNECT_SECONDS: ${RABBITMQ_RECONNECT_SECONDS:-5}
      DOWNLOAD_TIMEOUT_SECONDS: ${DOWNLOAD_TIMEOUT_SECONDS:-30}
      IA_TIMEOUT_SECONDS: ${IA_TIMEOUT_SECONDS:-60}
      ALLOWED_IMAGE_HOSTS: ${ALLOWED_IMAGE_HOSTS:-}
      MAX_IMAGE_BYTES: ${MAX_IMAGE_BYTES:-10485760}
      RABBITMQ_HEARTBEAT_SECONDS: ${RABBITMQ_HEARTBEAT_SECONDS:-600}
      RABBITMQ_BLOCKED_CONNECTION_TIMEOUT_SECONDS: ${RABBITMQ_BLOCKED_CONNECTION_TIMEOUT_SECONDS:-300}
      DEBUG_MAX_RUNS: ${DEBUG_MAX_RUNS:-20}
    volumes:
      - ../guara-vivo-worker/debug-images:/debug/worker-images
    depends_on:
      rabbitmq:
        condition: service_healthy
      identifier:
        condition: service_started
    networks:
      - guara-vivo-network

  rabbitmq:
    image: rabbitmq:3-management
    restart: unless-stopped
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - guara-vivo-network

networks:
  guara-vivo-network:
    driver: bridge

volumes:
  rabbitmq_data:
